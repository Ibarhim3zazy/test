<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>style.2.3</title>
	<style>
		div
		{
			width: 100px;
			height: 100px;
			background: #f00;
			transition: 2s;
		}
		div:hover
		{
			background: #ff0;
			transform: translate(500px,200px) rotate(360deg)  scale(4,4) ;
			
		}
	</style>
</head>

<body>
	<div>Ibrahim</div>
</body>
</html>
