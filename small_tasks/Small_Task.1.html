<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Small_Task.1</title>
	<style>
		.setting
		{
			width: 50%;
			height: 200px;
			padding-left: 600px;
			padding-top: 50px;
		}
		.bullet
		{
			width: 80%;
			height: 200px;
			padding-left: 50px;
			padding-top: 50px;
			margin-bottom: 20px;
		}
		.rain
		{
			width: 95%;
			height: 400px;
			padding-left: 50px;
			padding-top: 50px;
			background: url(cloud.png) repeat-x;
		}
		.list
		{
			width: 95%;
			height: 400px;
		}
		#setting:hover
		{
			transition: 2s;
			transform: rotate(720deg);
		}
		#bullet
		{
			transition: 596484s;
			transform: scale(.5,.5) translateX(-300px) translateY(-70px) rotate(90deg);
			margin-right: 600px;
			padding-bottom: 20px
		}
		#bullet:hover
		{
			transition: 2s;
			transform: translate(1000px,-40px) rotate(90deg) scale(.5,.5);
		}
		#bill
		{
			width: 50px;
			/*transform: scale(-1,1);*/
		}
		#bill:hover
		{
			transition: 2s;
			transform: scale(1,1) rotate(25deg) translate(900px,-400px);
		}
		#rainy
		{
			transition: 6544s;
			background: url("rain.ico") repeat;
			width: 100%;
			height: 400px
		} 
		#rainy:hover
		{
			transition: 2s;
			transform: translateY(500px);
		}
		#ball:hover
		{
			transition: 2s;
			transform: rotate(1000deg) scale(1,1);
		}
		.balll
		{
			width: 150px;
			height: 150px;
			margin-left: 100px;
		}
		.balll:hover
		{
			transition: 2s;
			transform: translate(1000px);
		}
		#menu
		{
			width:250px;
			height: 400px;
			transform: translate(-205px)
		}
		#menu:hover
		{
			transform: translate(0px)
		}
		.clist
		{
			float: left;
			width: 170px;
			height: 30px;
			font-size: 20px;
			border-bottom: solid;
			border-width: 1px;
			padding-left: 20px;
			padding-top: 5px;
		}
	</style>
</head>

<body>
	<div class="setting">
		<img src="setting.ico" alt="setting" id="setting">
	</div>
	<div class="bullet">
		<img src="gun.ico" alt="gun" style="float: left;">
		<img src="bullet.ico" alt="bullet" id="bullet">
	</div>
	<div class="bullet">
		<img src="tank.png" alt="gun" style="float: left;">
		<img src="bill.ico" alt="bullet" id="bill">
	</div>
	<div class="rain">
		<div id="rainy"><table width="10px"></table></div>
	</div>
	<div class="balll">
		<img src="ball.ico" alt="ball" id="ball">
	</div>
	<div class="list">
		<div id="menu">
			<img src="menu.ico" alt="menu" style="width: 50px; float: right;">
			<div class="clist">kaljdkadsfljk</div>
			<div class="clist">kaljdkadsfljk</div>
			<div class="clist">kaljdkadsfljk</div>
			<div class="clist">kaljdkadsfljk</div>
			<div class="clist">kaljdkadsfljk</div>
			<div class="clist">kaljdkadsfljk</div>
			<div class="clist">kaljdkadsfljk</div>
			<div class="clist">kaljdkadsfljk</div>
			<div class="clist">kaljdkadsfljk</div>
			
			
		</div>
	</div>
</body>
</html>
